<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AKASHIC LP</title>
  <style>
    :root {
      --bg: #04060c;
      --fg: #f3f1ea;
      --muted: #8a8f9c;
      --accent: #ff5a1f;
      --card: #0c111c;
      --border: #1b2231;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans",
        "Hiragino Kaku Gothic ProN", "Noto Sans JP", Meiryo, sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 56px 20px 80px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .brand .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 16px var(--accent);
    }
    h1 {
      font-size: 22px;
      letter-spacing: 0.18em;
      margin: 0;
      font-weight: 700;
    }
    .lede {
      color: var(--muted);
      font-size: 14px;
      margin: 4px 0 36px;
    }
    .list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 20px 22px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s ease, transform 0.2s ease, background 0.2s ease;
    }
    .card:hover {
      border-color: var(--accent);
      background: #0f1623;
      transform: translateY(-2px);
    }
    .card .title {
      font-size: 17px;
      font-weight: 600;
    }
    .card .sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }
    .card .arrow {
      color: var(--accent);
      font-size: 20px;
      flex: none;
    }
    footer {
      margin-top: 48px;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="brand">
      <span class="dot"></span>
      <h1>AKASHIC LP</h1>
    </div>
    <p class="lede">ランディングページ集</p>

    <div class="list">
      <a class="card" href="./bookcafe/">
        <span>
          <span class="title">ブックカフェからの脱出</span>
          <span class="sub">体験型謎解きLP</span>
        </span>
        <span class="arrow">&rarr;</span>
      </a>
      <!-- 新しいLPを追加するには: ディレクトリを作って index.html を置き、ここにカードを1枚追加 -->
    </div>

    <footer>&copy; AKASHIC</footer>
  </main>
</body>
</html>
